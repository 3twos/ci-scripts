<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --bg4: #282e36;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.15);
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.15);
  --yellow: #d29922;
  --yellow-dim: rgba(210,153,34,0.15);
  --blue: #58a6ff;
  --blue-dim: rgba(88,166,255,0.12);
  --purple: #bc8cff;
  --purple-dim: rgba(188,140,255,0.1);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  --radius: 6px;
  --radius-lg: 10px;
}

html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* ─── Header ─── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 18px; font-weight: 700; }
.logo svg { vertical-align: -3px; margin-right: 6px; }
.logo a { color: var(--text); text-decoration: none; }
.logo a:hover { color: var(--blue); }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
}
.chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.chip .dot.green { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.4); }
.chip .dot.yellow { background: var(--yellow); }
.chip .dot.red { background: var(--red); }
header .spacer { flex: 1; }
.header-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.header-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--text3); }
.header-btn.active { color: var(--green); border-color: var(--green); background: rgba(63,185,80,0.08); }

/* Voice selector */
.voice-group { display: inline-flex; align-items: center; gap: 0; }
.voice-group .header-btn { border-radius: var(--radius) 0 0 var(--radius); }
.voice-select {
  padding: 5px 4px 5px 8px; border-radius: 0 var(--radius) var(--radius) 0;
  border: 1px solid var(--border); border-left: none;
  background: var(--bg3); color: var(--text2); font-size: 11px; cursor: pointer;
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='%238b949e' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 5L0 0h8z'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 6px center;
  padding-right: 18px; max-width: 140px;
  transition: all 0.15s;
}
.voice-select:hover { background-color: var(--bg4); border-color: var(--text3); }
.voice-select:focus { outline: none; border-color: var(--blue); }

/* ─── Main ─── */
main { flex: 1; overflow: auto; padding: 20px 24px; }

/* ─── Column headers ─── */
.col-headers {
  display: grid;
  grid-template-columns: 36px 24px 1fr 150px 110px 120px 32px 80px;
  gap: 8px;
  padding: 0 18px 6px;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  user-select: none;
}

/* ─── PR Cards ─── */
.pr-list { display: flex; flex-direction: column; gap: 6px; }
.pr-card {
  display: grid;
  grid-template-columns: 36px 24px 1fr 150px 110px 120px 32px 80px;
  align-items: center;
  gap: 8px;
  column-gap: 6px;
  padding: 12px 18px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: border-color 0.15s, background 0.15s;
}
.pr-card:hover { border-color: var(--text3); background: var(--bg3); }

.pr-num { font-family: var(--mono); font-size: 13px; font-weight: 600; }
.pr-num a { color: var(--blue); text-decoration: none; }
.pr-num a:hover { text-decoration: underline; }

.badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
}
.badge-ready { background: var(--green-dim); color: var(--green); }
.badge-conflict { background: var(--red-dim); color: var(--red); }
.badge-ci-fail { background: var(--red-dim); color: var(--red); }
.badge-behind { background: var(--yellow-dim); color: var(--yellow); }
.badge-pending { background: var(--blue-dim); color: var(--blue); }
.badge-review { background: var(--yellow-dim); color: var(--yellow); }
.badge-no-review { background: var(--yellow-dim); color: var(--yellow); }
.badge-draft { background: var(--purple-dim); color: var(--purple); }
.badge-open { background: var(--blue-dim); color: var(--blue); }

/* Column cells */
.cell { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
.cell svg { flex-shrink: 0; opacity: 0.5; }
.ci-pass { color: var(--green); }
.ci-fail { color: var(--red); }
.ci-pend { color: var(--yellow); }
.ci-none { color: var(--text3); }
.merge-clean { color: var(--green); }
.merge-conflict { color: var(--red); }
.merge-behind { color: var(--yellow); }
.merge-blocked { color: var(--yellow); }
.merge-unknown { color: var(--text3); }
.threads-warn { color: var(--yellow); font-weight: 600; }
.threads-ok { color: var(--text3); }

.pr-title-cell {
  min-width: 0; font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pr-title-cell a { color: var(--text); text-decoration: none; }
.pr-title-cell a:hover { color: var(--blue); }
.pr-branch { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.size-xs { color: var(--text3); }
.size-s { color: var(--text3); }
.size-m { color: var(--blue); }
.size-l { color: var(--yellow); }
.size-xl { color: var(--red); }
.sev-critical { color: var(--red); font-weight: 600; }
.sev-suggestion { color: var(--yellow); }
.sev-note { color: var(--text2); }
.complexity-cell { font-size: 10px; line-height: 1.5; white-space: nowrap; }

/* Action buttons in status column */
.action-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 20px; border: none;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-merge { background: var(--green); color: #fff; }
.btn-merge:hover { background: #2ea043; box-shadow: 0 0 8px rgba(63,185,80,0.3); }
.btn-update { background: var(--yellow); color: #000; }
.btn-update:hover { background: #c08a1e; }
.btn-updating { background: var(--yellow-dim); color: var(--yellow); cursor: wait; }
.btn-merging { background: var(--green-dim); color: var(--green); cursor: wait; }

/* ─── Deployments ─── */
#deploy-section {
  border-top: 1px solid var(--border);
  padding: 16px 24px 8px;
  flex-shrink: 0;
}
#deploy-section.hidden { display: none; }
.deploy-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  font-size: 12px; color: var(--text2);
}
.deploy-header .deploy-title { font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; font-size: 10px; color: var(--text3); }
.deploy-list { display: flex; flex-direction: column; gap: 4px; }
.deploy-row {
  display: grid;
  grid-template-columns: 24px 1fr 80px 70px;
  gap: 8px;
  align-items: center;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: var(--radius);
  background: var(--bg);
}
.deploy-row:hover { background: var(--bg3); }
.deploy-icon { text-align: center; }
.deploy-title-cell {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.deploy-title-cell a { color: var(--text); text-decoration: none; font-size: 12px; font-weight: 500; }
.deploy-title-cell a:hover { color: var(--blue); }
.deploy-branch { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.deploy-status { font-size: 11px; text-align: right; }
.deploy-time { font-size: 11px; color: var(--text3); text-align: right; font-family: var(--mono); }
.dep-ready { color: var(--green); }
.dep-building { color: var(--yellow); }
.dep-queued { color: var(--blue); }
.dep-error { color: var(--red); }
.dep-canceled { color: var(--text3); }

/* ─── Alert Panel ─── */
#alert-panel {
  flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg2);
  max-height: 160px; overflow-y: auto; padding: 6px 24px;
}
#alert-panel:empty::before { content: 'Waiting for events...'; color: var(--text3); font-size: 11px; font-style: italic; }
.alert-entry { display: flex; align-items: baseline; gap: 8px; padding: 2px 0; font-size: 11px; line-height: 1.5; }
.alert-ts { color: var(--text3); font-family: var(--mono); font-size: 10px; flex-shrink: 0; }
.alert-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.alert-dot.success { background: var(--green); }
.alert-dot.error { background: var(--red); }
.alert-dot.warning { background: var(--yellow); }
.alert-dot.info { background: var(--blue); }
.alert-msg { color: var(--text2); }

/* ─── Flash ─── */
@keyframes cardFlash {
  0% { border-color: var(--blue); box-shadow: 0 0 12px var(--blue-dim); }
  100% { border-color: var(--border); box-shadow: none; }
}
.pr-card.flash { animation: cardFlash 2s ease-out; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; height: 300px; color: var(--text2); font-size: 15px;
}
.empty-state svg { opacity: 0.3; }

#wh-flash {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue); opacity: 0; transition: opacity 0.1s; margin-left: 2px;
}
#wh-flash.on { opacity: 1; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <span class="logo">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"/></svg>
    <a id="repo-link" href="#" target="_blank"><span id="repo-name">PR Monitor</span></a>
  </span>
  <span class="chip"><span id="pr-count">0</span> open</span>
  <span style="font-size:10px;color:var(--text3);margin-left:4px" title="Build version">__BUILD_VERSION__</span>
  <span class="spacer"></span>
  <span class="chip"><span class="dot" id="conn-dot"></span><span id="conn-label">...</span><span id="wh-flash"></span></span>
  <span class="voice-group">
    <button class="header-btn" id="voice-btn" onclick="toggleVoice()" title="Toggle voice alerts">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      <span id="voice-label">Voice</span>
    </button>
    <select class="voice-select" id="voice-select" onchange="selectVoice(this.value)" title="Select voice"></select>
  </span>
  <span class="voice-group" id="deploy-voice-group" style="display:none">
    <span style="font-size:11px;color:var(--text3);margin:0 4px">Deploy:</span>
    <select class="voice-select" id="deploy-voice-select" onchange="selectDeployVoice(this.value)" title="Deploy voice"></select>
  </span>
  <button class="header-btn" onclick="doRefresh()" title="Refresh now">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
</header>

<main>
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"/></svg>
    Connecting...
  </div>
  <div id="pr-container" style="display:none">
    <div class="col-headers" id="col-headers">
      <span>#</span><span></span><span>title</span><span>review</span><span>reviewers</span><span>status</span><span>ci</span><span>merge</span>
    </div>
    <div class="pr-list" id="pr-list"></div>
  </div>
</main>

<div id="deploy-section" class="hidden">
  <div class="deploy-header">
    <span class="deploy-title">Deployments</span>
    <span id="deploy-project-name"></span>
  </div>
  <div class="deploy-list" id="deploy-list"></div>
</div>

<div id="alert-panel"></div>

<script>
const IC = {
  ci: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
  merge: '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8-9a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"/></svg>',
  review: '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 2.75a.25.25 0 0 1 .25-.25h8.5a.25.25 0 0 1 .25.25v5.5a.25.25 0 0 1-.25.25h-3.5a.75.75 0 0 0-.53.22L3.5 11.44V9.25a.75.75 0 0 0-.75-.75h-1a.25.25 0 0 1-.25-.25Zm.25-1.75A1.75 1.75 0 0 0 0 2.75v5.5C0 9.216.784 10 1.75 10H2v1.543a1.46 1.46 0 0 0 2.487 1.03L7.061 10h3.189A1.75 1.75 0 0 0 12 8.25v-5.5A1.75 1.75 0 0 0 10.25 1ZM14.5 4.75a.25.25 0 0 0-.25-.25h-.5a.75.75 0 0 1 0-1.5h.5c.966 0 1.75.784 1.75 1.75v5.5A1.75 1.75 0 0 1 14.25 12H14v1.543a1.46 1.46 0 0 1-2.487 1.03L9.22 12.28a.75.75 0 0 1 1.06-1.06l2.22 2.22v-2.19a.75.75 0 0 1 .75-.75h1a.25.25 0 0 0 .25-.25Z"/></svg>',
  comment: '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 13.25 12H9.06l-2.573 2.573A1.458 1.458 0 0 1 4 13.543V12H2.75A1.75 1.75 0 0 1 1 10.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h4.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>',
  people: '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 5.5a3.5 3.5 0 1 1 5.898 2.549 5.508 5.508 0 0 1 3.034 4.084.75.75 0 1 1-1.482.235 4.001 4.001 0 0 0-6.9 0 .75.75 0 0 1-1.482-.236A5.507 5.507 0 0 1 4.6 8.049 3.5 3.5 0 0 1 2 5.5ZM5.5 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Zm5.5 0a.75.75 0 0 1 .75.75 2.25 2.25 0 1 0 2.25 2.25.75.75 0 0 1 1.5 0 3.75 3.75 0 0 1-6.652 2.387.75.75 0 0 1 1.081-.55A2.25 2.25 0 0 0 12.75 7 .75.75 0 0 1 11 4.75V4Z"/></svg>',
  squash: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg>',
};

let prs = [], prevPrMap = new Map(), serverConfig = {};
let voiceUnlocked = false, voiceQueue = [], speaking = false, selectedVoice = null;
let startedAt = 0, evtSource = null;
let deployments = [];
let selectedDeployVoice = null;

// ── SSE ──
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/events');
  evtSource.addEventListener('init', (e) => {
    const d = JSON.parse(e.data);
    serverConfig = d.config || {};
    startedAt = d.startedAt || Date.now();
    prs = d.prs || [];
    renderPrs(prs, true);
    (d.alerts || []).forEach(a => appendAlert(a, false));
    if (d.deployments) { deployments = d.deployments; renderDeployments(deployments); }
    (d.deployAlerts || []).forEach(a => appendDeployAlert(a, false));
    if (d.vercelConfig) {
      document.getElementById('deploy-voice-group').style.display = '';
    }
    setConn('live');
    document.getElementById('repo-name').textContent = serverConfig.repo || 'PR Monitor';
    document.getElementById('repo-link').href = `https://github.com/${serverConfig.repo}/pulls`;
    document.getElementById('pr-count').textContent = prs.length;
  });
  evtSource.addEventListener('state', (e) => {
    prs = JSON.parse(e.data).prs || [];
    renderPrs(prs, false);
    document.getElementById('pr-count').textContent = prs.length;
  });
  evtSource.addEventListener('alert', (e) => appendAlert(JSON.parse(e.data), true));
  evtSource.addEventListener('deployments', (e) => {
    deployments = JSON.parse(e.data).deployments || [];
    renderDeployments(deployments);
  });
  evtSource.addEventListener('deploy-alert', (e) => appendDeployAlert(JSON.parse(e.data), true));
  evtSource.addEventListener('heartbeat', () => {});
  evtSource.addEventListener('webhook', () => flashWh());
  evtSource.addEventListener('shutdown', () => setConn('disconnected'));
  evtSource.onerror = () => {
    setConn('disconnected');
    evtSource.close();
    evtSource = null;
    setTimeout(connectSSE, 3000);
  };
}

// ── Render ──
function renderPrs(list, initial) {
  const container = document.getElementById('pr-container');
  const el = document.getElementById('pr-list');
  const empty = document.getElementById('empty-state');

  if (list.length === 0) {
    container.style.display = 'none';
    empty.style.display = 'flex';
    empty.textContent = 'No open PRs';
    return;
  }
  container.style.display = '';
  empty.style.display = 'none';

  const sorted = [...list].sort((a, b) => a.number - b.number);
  const newMap = new Map();
  const frag = document.createDocumentFragment();

  for (const pr of sorted) {
    newMap.set(pr.number, pr);
    const changed = !initial && hasChanged(pr);
    const card = document.createElement('div');
    card.className = 'pr-card' + (changed ? ' flash' : '');
    card.dataset.pr = pr.number;

    const allRevs = [...new Set([...(pr.reviewers || []), ...(pr.requestedReviewers || [])])].map(shortName).join(', ');
    const resolved = (pr.totalThreads || 0) - (pr.unresolvedThreads || 0);
    const threadStr = pr.totalThreads > 0
      ? `${resolved}/${pr.totalThreads}`
      : '0';
    const threadClass = pr.unresolvedThreads > 0 ? 'threads-warn' : 'threads-ok';

    card.innerHTML = `
      <div class="pr-num"><a href="${esc(pr.url)}" target="_blank">#${pr.number}</a></div>
      <div class="size-${(pr.sizeLabel||'xs').toLowerCase()}" title="${pr.additions}+ ${pr.deletions}- ${pr.changedFiles} files" style="font-size:16px;text-align:center;line-height:1">${sizeIcon(pr.sizeLabel)}</div>
      <div class="pr-title-cell">
        <a href="${esc(pr.url)}" target="_blank" title="${esc(pr.title)}">${esc(pr.title)}</a>
        <div class="pr-branch">${esc(pr.branch)}</div>
      </div>
      <div class="complexity-cell">${complexityColumn(pr, threadStr, threadClass)}</div>
      <div class="cell" style="color:var(--text2);font-size:11px" title="${esc(allRevs)}">${allRevs ? esc(allRevs) : '<span style="color:var(--text3)">\u2014</span>'}</div>
      <div>${statusCell(pr)}</div>
      <div class="cell ${ciClass(pr.ciStatus)}" title="CI: ${pr.ciStatus}">${ciIcon(pr.ciStatus)}</div>
      <div class="cell ${mergeClass(pr.mergeable, pr.mergeStateStatus)}">${IC.merge} ${mergeText(pr.mergeable, pr.mergeStateStatus)}</div>
    `;
    frag.appendChild(card);
  }
  el.replaceChildren(frag);
  prevPrMap = newMap;
}

function hasChanged(pr) {
  const p = prevPrMap.get(pr.number);
  if (!p) return true;
  return p.ciStatus !== pr.ciStatus || p.mergeable !== pr.mergeable || p.mergeStateStatus !== pr.mergeStateStatus
    || p.reviewState !== pr.reviewState || p.reviewCount !== pr.reviewCount
    || p.unresolvedThreads !== pr.unresolvedThreads || p.isReady !== pr.isReady || p.totalThreads !== pr.totalThreads
    || p.isUpdating !== pr.isUpdating;
}

function statusCell(pr) {
  // "needs update" = actually behind base branch, not just blocked by protection rules
  const needsUpdate = ['BEHIND', 'DIRTY'].includes(pr.mergeStateStatus) && pr.mergeable !== 'CONFLICTING';

  // Actionable: ready to merge
  if (pr.isReady) return `<button class="action-btn btn-merge" onclick="doMerge(${pr.number}, this)">${IC.squash} Merge</button>`;

  // Updating states
  if (pr.isUpdating) return '<span class="action-btn btn-updating">\u25D1 Updating</span>';
  if (needsUpdate && pr.ciStatus === 'pending') return '<span class="action-btn btn-updating">\u25D1 CI Running</span>';

  // Non-actionable blockers
  if (pr.isDraft) return '<span class="badge badge-draft">Draft</span>';
  if (pr.mergeable === 'CONFLICTING') return '<span class="badge badge-conflict">Conflict</span>';
  if (pr.ciStatus === 'failing') return '<span class="badge badge-ci-fail">CI Fail</span>';
  if (pr.ciStatus === 'pending') return '<span class="badge badge-pending">CI Pending</span>';

  // Behind — actionable update
  if (needsUpdate) return `<button class="action-btn btn-update" onclick="doUpdate(${pr.number}, this)">\u2191 Update</button>`;

  // Review blockers — unresolved threads take priority
  { const u = Number(pr.unresolvedThreads) || 0;
    if (u > 0) return '<span class="badge badge-review">Unresolved</span>'; }
  if (pr.reviewState === 'changes') return '<span class="badge badge-review">Changes</span>';
  if (pr.reviewState === 'none' && !pr.isDraft) return '<span class="badge badge-no-review">No Review</span>';
  if (pr.reviewState === 'pending') return '<span class="badge badge-pending">Reviewed</span>';

  return '<span class="badge badge-open">Open</span>';
}

function ciClass(s) { return { passing:'ci-pass', failing:'ci-fail', pending:'ci-pend', none:'ci-none' }[s] || 'ci-none'; }
function ciIcon(s) {
  return { passing:'\u2714', failing:'\u2718', pending:'\u25D1', none:'\u2014' }[s] || s;
}
function mergeClass(m, s) {
  if (m === 'CONFLICTING') return 'merge-conflict';
  return { CLEAN:'merge-clean', BEHIND:'merge-behind', BLOCKED:'merge-blocked', DIRTY:'merge-conflict' }[s] || 'merge-unknown';
}
function mergeText(m, s) {
  if (m === 'CONFLICTING') return 'conflict';
  return { CLEAN:'clean', BEHIND:'behind', BLOCKED:'blocked', DIRTY:'dirty', UNSTABLE:'unstable', UNKNOWN:'\u2014' }[s] || s;
}
function complexityColumn(pr, threadStr, threadClass) {
  const s = pr.commentSeverity || {};
  const lines = [];
  if (s.critical > 0) lines.push(`<div class="sev-critical">\u26A0 ${s.critical} critical</div>`);
  if (s.suggestion > 0) lines.push(`<div class="sev-suggestion">${s.suggestion} suggestion${s.suggestion>1?'s':''}</div>`);
  if (s.note > 0) lines.push(`<div class="sev-note">${s.note} note${s.note>1?'s':''}</div>`);
  // Thread progress
  if (pr.totalThreads > 0) {
    lines.push(`<div class="${threadClass}">${threadStr} resolved</div>`);
  }
  if (lines.length === 0) return '<span style="color:var(--text3)">\u2014</span>';
  return lines.join('');
}
function sizeIcon(label) {
  // Vertical bars: more bars = bigger PR
  const bars = { XS: '\u2581', S: '\u2582', M: '\u2584', L: '\u2586', XL: '\u2588' };
  return (bars[label] || '\u2581');
}
function shortName(l) { return l.startsWith('copilot') ? 'copilot' : l.split(/[-_.]/)[0]; }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ── Actions ──
async function doMerge(num, btn) {
  btn.disabled = true;
  btn.className = 'action-btn btn-merging';
  btn.innerHTML = IC.squash + ' Merging\u2026';
  try {
    const r = await fetch(`/api/merge/${num}`, { method: 'POST' });
    const data = await r.json();
    btn.innerHTML = data.ok ? (IC.squash + ' Merged!') : (IC.squash + ' Failed');
  } catch { btn.innerHTML = IC.squash + ' Error'; }
}
async function doUpdate(num, btn) {
  btn.disabled = true;
  btn.className = 'action-btn btn-updating';
  btn.innerHTML = '\u25D1 Updating';
  try {
    await fetch(`/api/update/${num}`, { method: 'POST' });
  } catch {}
}
function doRefresh() { fetch('/api/refresh', { method: 'POST' }); }

// ── Alerts ──
function appendAlert(a, live) {
  const panel = document.getElementById('alert-panel');
  const entry = document.createElement('div');
  entry.className = 'alert-entry';
  const ts = new Date(a.ts).toLocaleTimeString('en-US', { hour12: false });
  entry.innerHTML = `<span class="alert-ts">${ts}</span><span class="alert-dot ${a.level}"></span><span class="alert-msg">${esc(a.message)}</span>`;
  panel.appendChild(entry);
  while (panel.children.length > 50) panel.removeChild(panel.firstChild);
  panel.scrollTop = panel.scrollHeight;
  if (live) { speakAlert(a.message); showNotif(a); }
}

// ── Voice with voice selector ──
let voiceList = [];

function loadVoices() {
  if (!window.speechSynthesis) return;
  const populate = () => {
    voiceList = speechSynthesis.getVoices();
    if (!voiceList.length) return;
    // Sort: premium first, then by name
    voiceList.sort((a, b) => {
      const ap = isPremium(a), bp = isPremium(b);
      if (ap && !bp) return -1;
      if (!ap && bp) return 1;
      return a.name.localeCompare(b.name);
    });
    const sel = document.getElementById('voice-select');
    sel.innerHTML = '';
    for (const v of voiceList) {
      const opt = document.createElement('option');
      opt.value = v.name;
      const tag = isPremium(v) ? ' \u2605' : '';
      opt.textContent = `${v.name}${tag}`;
      sel.appendChild(opt);
    }
    // Restore saved voice or auto-select best premium english voice
    const saved = localStorage.getItem('pr-monitor-voice');
    const match = saved && voiceList.find(v => v.name === saved);
    if (match) {
      selectedVoice = match;
      sel.value = match.name;
    } else if (!selectedVoice) {
      const best = voiceList.find(v => isPremium(v) && v.lang.startsWith('en')) || voiceList.find(v => v.lang.startsWith('en')) || voiceList[0];
      if (best) { selectedVoice = best; sel.value = best.name; }
    }
  };
  populate();
  speechSynthesis.addEventListener('voiceschanged', populate);
}

function isPremium(v) {
  const n = v.name.toLowerCase();
  return n.includes('premium') || n.includes('enhanced') || n.includes('natural')
    || n.includes('neural') || n.includes('wavenet') || n.includes('google');
}

function selectVoice(name) {
  selectedVoice = voiceList.find(v => v.name === name) || null;
  try { localStorage.setItem('pr-monitor-voice', name); } catch {}
}

function toggleVoice() {
  const btn = document.getElementById('voice-btn');
  if (!window.speechSynthesis) return;
  if (voiceUnlocked) {
    voiceUnlocked = false;
    speechSynthesis.cancel();
    btn.classList.remove('active');
  } else {
    voiceUnlocked = true;
    btn.classList.add('active');
    const u = new SpeechSynthesisUtterance('PR monitor active');
    if (selectedVoice) u.voice = selectedVoice;
    speechSynthesis.speak(u);
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  }
  try { localStorage.setItem('pr-monitor-voice-enabled', voiceUnlocked ? '1' : '0'); } catch {}
}

function speakAlert(msg) {
  if (!voiceUnlocked || serverConfig.noVoice || !window.speechSynthesis) return;
  voiceQueue.push({ text: msg, voice: selectedVoice });
  drainVoice();
}
function drainVoice() {
  if (speaking || !voiceQueue.length) return;
  speaking = true;
  const item = voiceQueue.shift();
  const text = typeof item === 'string' ? item : item.text;
  const voice = typeof item === 'string' ? selectedVoice : (item.voice || selectedVoice);
  const u = new SpeechSynthesisUtterance(text);
  if (voice) u.voice = voice;
  u.rate = 1.0;
  u.onend = u.onerror = () => { speaking = false; drainVoice(); };
  speechSynthesis.speak(u);
}

// ── Notifications ──
function showNotif(a) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  new Notification(`PR #${a.prNumber}`, { body: a.message, tag: 'pr-' + a.prNumber, silent: true });
}

// ── Connection ──
function setConn(s) {
  document.getElementById('conn-dot').className = 'dot ' + { live:'green', polling:'yellow', disconnected:'red' }[s];
  document.getElementById('conn-label').textContent = { live:'Live', polling:'Polling', disconnected:'Offline' }[s] || s;
}
let whTimer;
function flashWh() {
  const el = document.getElementById('wh-flash');
  el.classList.add('on');
  clearTimeout(whTimer);
  whTimer = setTimeout(() => el.classList.remove('on'), 400);
}

// ── Deployments ──
function deployDuration(dep) {
  const start = dep.createdAtMs ? dep.createdAtMs / 1000 : 0;
  if (!start) return '';
  const end = dep.readyAtMs ? dep.readyAtMs / 1000 : Date.now() / 1000;
  const secs = Math.max(0, Math.floor(end - start));
  if (secs < 60) return secs + 's';
  return Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
}

function deployAge(dep) {
  if (!dep.createdAtMs) return '';
  const secs = Math.floor((Date.now() - dep.createdAtMs) / 1000);
  if (secs < 60) return 'just now';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  return Math.floor(secs / 3600) + 'h ago';
}

function renderDeployments(list) {
  const section = document.getElementById('deploy-section');
  const el = document.getElementById('deploy-list');
  if (!list || list.length === 0) { section.classList.add('hidden'); return; }
  section.classList.remove('hidden');
  el.innerHTML = '';
  for (const dep of list) {
    const row = document.createElement('div');
    row.className = 'deploy-row';
    const state = (dep.state || dep.readyState || '').toUpperCase();
    let icon, iconClass;
    if (state === 'READY') { icon = '\u2713'; iconClass = 'dep-ready'; }
    else if (['BUILDING', 'QUEUED', 'INITIALIZING'].includes(state)) { icon = '\u25D1'; iconClass = 'dep-building'; }
    else if (['ERROR', 'FAILED'].includes(state)) { icon = '\u2716'; iconClass = 'dep-error'; }
    else if (state === 'CANCELED') { icon = '\u25A0'; iconClass = 'dep-canceled'; }
    else { icon = '\u25CB'; iconClass = 'dep-building'; }
    const title = dep.changeTitle || dep.branch || dep.name || '';
    const branch = dep.branch || '';
    const url = dep.url || dep.inspectorUrl || '#';
    const isActive = ['BUILDING', 'QUEUED', 'INITIALIZING'].includes(state);
    const statusText = isActive
      ? (dep.stepName ? dep.stepName : state.toLowerCase()) + ' ' + deployDuration(dep)
      : state.toLowerCase();
    const timeText = dep.readyAtMs ? deployDuration(dep) + ' \u00B7 ' + deployAge(dep) : (isActive ? deployDuration(dep) : deployAge(dep));
    row.innerHTML = `
      <div class="deploy-icon ${iconClass}">${icon}</div>
      <div class="deploy-title-cell">
        <a href="${esc(url)}" target="_blank" title="${esc(title)}">${esc(title)}</a>
        <div class="deploy-branch">${esc(branch)}</div>
      </div>
      <div class="deploy-status ${iconClass}">${esc(statusText)}</div>
      <div class="deploy-time">${esc(timeText)}</div>
    `;
    el.appendChild(row);
  }
}

function appendDeployAlert(a, live) {
  const panel = document.getElementById('alert-panel');
  const entry = document.createElement('div');
  entry.className = 'alert-entry';
  const ts = new Date(a.ts).toLocaleTimeString('en-US', { hour12: false });
  entry.innerHTML = `<span class="alert-ts">${ts}</span><span class="alert-dot ${a.level}"></span><span class="alert-msg">${esc(a.message)}</span>`;
  panel.appendChild(entry);
  while (panel.children.length > 50) panel.removeChild(panel.firstChild);
  panel.scrollTop = panel.scrollHeight;
  if (live) { speakDeployAlert(a.message); showNotif(a); }
}

function speakDeployAlert(msg) {
  if (!voiceUnlocked || serverConfig.noVoice || !window.speechSynthesis) return;
  voiceQueue.push({ text: msg, voice: selectedDeployVoice });
  drainVoice();
}

// ── Deploy Voice ──
function loadDeployVoices() {
  if (!window.speechSynthesis) return;
  const populate = () => {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    const sorted = [...voices].sort((a, b) => {
      const ap = isPremium(a), bp = isPremium(b);
      if (ap && !bp) return -1;
      if (!ap && bp) return 1;
      return a.name.localeCompare(b.name);
    });
    const sel = document.getElementById('deploy-voice-select');
    sel.innerHTML = '';
    for (const v of sorted) {
      const opt = document.createElement('option');
      opt.value = v.name;
      const tag = isPremium(v) ? ' \u2605' : '';
      opt.textContent = `${v.name}${tag}`;
      sel.appendChild(opt);
    }
    const saved = localStorage.getItem('pr-monitor-deploy-voice');
    const match = saved && sorted.find(v => v.name === saved);
    if (match) {
      selectedDeployVoice = match;
      sel.value = match.name;
    } else if (!selectedDeployVoice) {
      // Pick a different default than the PR voice
      const prVoiceName = selectedVoice ? selectedVoice.name : '';
      const best = sorted.find(v => isPremium(v) && v.lang.startsWith('en') && v.name !== prVoiceName)
        || sorted.find(v => v.lang.startsWith('en') && v.name !== prVoiceName)
        || sorted.find(v => v.name !== prVoiceName)
        || sorted[0];
      if (best) { selectedDeployVoice = best; sel.value = best.name; }
    }
  };
  populate();
  speechSynthesis.addEventListener('voiceschanged', populate);
}

function selectDeployVoice(name) {
  const voices = speechSynthesis.getVoices();
  selectedDeployVoice = voices.find(v => v.name === name) || null;
  try { localStorage.setItem('pr-monitor-deploy-voice', name); } catch {}
}

// ── Init ──
loadVoices();
loadDeployVoices();
connectSSE();

// Restore voice enabled state — needs a user gesture to actually unlock speech.
// We show the button as active and unlock on the first click/keypress anywhere.
if (localStorage.getItem('pr-monitor-voice-enabled') === '1' && window.speechSynthesis) {
  voiceUnlocked = false; // not truly unlocked yet
  document.getElementById('voice-btn').classList.add('active');
  const unlockOnGesture = () => {
    if (voiceUnlocked) return;
    voiceUnlocked = true;
    // Speak a silent utterance to unlock the audio context
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    if (selectedVoice) u.voice = selectedVoice;
    speechSynthesis.speak(u);
    document.removeEventListener('click', unlockOnGesture);
    document.removeEventListener('keydown', unlockOnGesture);
  };
  document.addEventListener('click', unlockOnGesture, { once: false });
  document.addEventListener('keydown', unlockOnGesture, { once: false });
}
</script>
